<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViaOS</title>

<style>

body{
margin:0;
background:#030508;
color:#e5e7eb;
font-family:system-ui;
overflow:hidden;
}

/* top bar */

#topbar{
position:fixed;
top:0;
left:0;
right:0;
height:32px;
background:#05070c;
border-bottom:1px solid #1e293b;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
font-size:13px;
}

/* launcher */

#launcher{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:8px;
background:#0b0f18;
border:1px solid #1e293b;
padding:10px;
border-radius:10px;
}

.launcher-btn{
background:#111827;
border:1px solid #1e293b;
color:white;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.launcher-btn:hover{
background:#1f2937;
}

/* window manager */

#window-manager{
position:absolute;
inset:0;
pointer-events:none;
}

/* window */

.os-window{
position:absolute;
width:640px;
height:420px;
background:#0b0f18;
border:1px solid #1e293b;
border-radius:8px;
box-shadow:0 15px 40px rgba(0,0,0,.6);
pointer-events:auto;
}

.window-header{
height:32px;
background:#111827;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
cursor:move;
font-size:13px;
}

.window-frame{
width:100%;
height:calc(100% - 32px);
border:none;
}

</style>
</head>

<body>

<div id="topbar">
<div>ViaOS</div>
<div id="clock"></div>
</div>

<div id="window-manager"></div>

<div id="launcher">

<button class="launcher-btn"
onclick="openTool('decision-core','decision-matrix')">
Decision Matrix
</button>

<button class="launcher-btn"
onclick="openTool('creator-studio','promptalchemy')">
PromptAlchemy
</button>

<button class="launcher-btn"
onclick="openTool('analytics-bay','json-formatter')">
JSON Formatter
</button>

<button class="launcher-btn"
onclick="openTool('game-arena','vialogic')">
ViaLogic
</button>

</div>

<script src="./scripts/window-manager.js"></script>
<script src="./scripts/spatial-engine.js"></script>

<script>

function openTool(zone,tool){
window.WM.openTool(zone,tool)
}

function clock(){
const n=new Date()
document.getElementById("clock").textContent=
n.getHours().toString().padStart(2,"0")+":"+
n.getMinutes().toString().padStart(2,"0")
}

setInterval(clock,1000)
clock()

</script>

</body>
</html>
